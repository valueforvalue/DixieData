<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DixieData</title>
  <link rel="stylesheet" href="/app.css"/>
  <script defer src="/htmx.min.js"></script>
  <script defer src="/app.js"></script>
  <style>
    :root {
      /* --floating-dock-height: measured at runtime by
         app.js::measureFloatingDockHeight. Default matches the
         relaxed dock height + 1rem breathing room, so pages without
         JS render with the same spacing they had before. Per
         docs/COMMON_BUGS.md §4.14, the previous hand-coded padding
         regressed 5 times; this variable + JS measurement is the
         prescribed fix. */
      --floating-dock-height: 4.5rem;
    }
    body {
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.7), transparent 26%),
        radial-gradient(circle at top right, rgba(255,255,255,0.28), transparent 18%),
        repeating-linear-gradient(135deg, rgba(34,45,57,0.025) 0, rgba(34,45,57,0.025) 6px, transparent 6px, transparent 18px),
        linear-gradient(180deg, #d7d2c9 0%, #c9c2b5 42%, #b9b1a3 100%);
      color: #22303d;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body hx-get="/calendar" hx-trigger="load">
  <!-- Loading card is rendered by internal/appshell/app.go::renderStartupPlaceholder
       so that copy and styling stay in one place. This shell exists for the
       brief window before the Go handler responds. -->
</body>
</html>
